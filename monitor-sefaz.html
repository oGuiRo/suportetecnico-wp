<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor SEFAZ | Centro de Comando</title>
  <link rel="icon" type="image/png" href="./IMAGES/BrasãoAba.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .sefaz-wrapper { max-width: 1200px; margin: 0 auto; }
    .sefaz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 24px; }
    .sf-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; transition: transform 0.2s; }
    .sf-card:hover { border-color: var(--accent-blue); transform: translateY(-2px); }
    .sf-header { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; text-align: center; }
    .sf-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; color: var(--text-secondary); }
    .sf-status { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13px; }
    
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.online { background: #10b981; box-shadow: 0 0 6px rgba(16, 185, 129, 0.4); }
    .dot.instavel { background: #f59e0b; box-shadow: 0 0 6px rgba(245, 158, 11, 0.4); }
    .dot.offline { background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.4); }
    
    .text-online { color: #10b981; }
    .text-instavel { color: #f59e0b; }
    .text-offline { color: #ef4444; }

    .btn-refresh { background: var(--accent-blue); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; transition: 0.2s; }
    .btn-refresh:hover { background: #007acc; }
    .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 16px; }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar collapsed" id="sidebar">
      <div class="sidebar-header"><button class="btn-hamburger" id="sidebar-toggle">☰</button></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><div class="nav-icon">🏠</div><span class="nav-text">Início</span></a>
        <a href="ftp.html" class="nav-item"><div class="nav-icon">📁</div><span class="nav-text">FTP Quality</span></a>
        <a href="validador.html" class="nav-item"><div class="nav-icon">&lt;/&gt;</div><span class="nav-text">Validador XML</span></a>
        <a href="conversor.html" class="nav-item"><div class="nav-icon">🔐</div><span class="nav-text">Conversor PFX</span></a>
        <a href="gerador-pay.html" class="nav-item"><div class="nav-icon">📱</div><span class="nav-text">Configurador PAY</span></a>
        <a href="monitor-sefaz.html" class="nav-item active"><div class="nav-icon">📡</div><span class="nav-text">Monitor Sefaz</span></a>
      </nav>
    </aside>

    <div class="app-container">
      <header class="topbar">
        <div class="brand" onclick="window.location.href='index.html'" style="cursor:pointer;">
          <div class="brand-icon"><img id="brand-logo" src="./IMAGES/LogoPreta_WP.png" alt="Logotipo" /></div>
          <div class="brand-text">Centro de Comando</div>
        </div>
        <div class="topbar-actions"><button id="theme-toggle" class="btn-icon">☀️</button></div>
      </header>
      
      <main class="main-content">
        <div class="sefaz-wrapper">
          <div class="header-flex">
            <div>
              <h2 style="color: var(--text-primary); margin-bottom: 8px;">📡 Status Nacional SEFAZ</h2>
              <p style="color: var(--text-secondary); font-size: 14px;">Monitoramento oficial (NF-e, NFC-e e Retornos).</p>
            </div>
            <button id="btn-atualizar" class="btn-refresh" onclick="carregarSefaz()">
              ↻ Atualizar Status
            </button>
          </div>

          <div id="status-msg" style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;"></div>
          
          <div id="sefaz-grid" class="sefaz-grid">
            <!-- Cards gerados pelo JavaScript -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="./js/dashboard.js"></script>
  <script>
    function renderStatus(status) {
      let texto = 'Fora do Ar';
      let classe = 'offline';
      
      if(status === 'online') { texto = 'Normal'; classe = 'online'; }
      else if(status === 'instavel') { texto = 'Instável'; classe = 'instavel'; }
      
      return `
        <div class="sf-status">
          <div class="dot ${classe}"></div>
          <span class="text-${classe}">${texto}</span>
        </div>
      `;
    }

    async function carregarSefaz() {
      const btn = document.getElementById('btn-atualizar');
      const grid = document.getElementById('sefaz-grid');
      const msg = document.getElementById('status-msg');
      
      btn.innerText = '↻ Buscando...';
      btn.disabled = true;
      grid.innerHTML = '';
      msg.innerText = 'Consultando Portal Oficial da Nota Fiscal Eletrônica...';
      
      try {
        // Usamos um Proxy CORS público para que o SEU navegador consiga ler o site da SEFAZ
        // Isso burla o bloqueio de IP que o governo coloca em servidores de nuvem como o Render.
        const urlSefaz = encodeURIComponent('http://www.nfe.fazenda.gov.br/portal/disponibilidade.aspx');
        const res = await fetch(`https://api.allorigins.win/get?url=${urlSefaz}`);
        const data = await res.json();
        
        if(!data.contents) throw new Error('Falha ao ler Sefaz');

        // Transforma o texto do site da Sefaz em HTML que podemos ler
        const parser = new DOMParser();
        const doc = parser.parseFromString(data.contents, 'text/html');
        
        // Pega as linhas da tabela oficial
        const linhas = doc.querySelectorAll('table.tabelaListagemDados tbody tr');
        if(linhas.length === 0) throw new Error('Tabela vazia');

        msg.innerText = 'Última atualização: ' + new Date().toLocaleTimeString();
        let html = '';
        
        linhas.forEach((linha, i) => {
          if (i === 0) return; // Pula o cabeçalho
          
          const colunas = linha.querySelectorAll('td');
          if (colunas.length < 5) return;

          const autorizador = colunas[0].innerText.trim();
          
          // Função interna para ver se a imagem da sefaz é verde, amarela ou vermelha
          const getStatus = (td) => {
            const img = td.querySelector('img');
            const src = img ? img.getAttribute('src') : '';
            if(src.includes('verde')) return 'online';
            if(src.includes('amarela')) return 'instavel';
            return 'offline';
          };

          html += `
            <div class="sf-card">
              <div class="sf-header">${autorizador}</div>
              <div class="sf-row">
                <span>Autorização</span>
                ${renderStatus(getStatus(colunas[1]))}
              </div>
              <div class="sf-row">
                <span>Retorno de Lot.</span>
                ${renderStatus(getStatus(colunas[2]))}
              </div>
              <div class="sf-row">
                <span>Consulta Cadastro</span>
                ${renderStatus(getStatus(colunas[4]))}
              </div>
            </div>
          `;
        });
        
        grid.innerHTML = html;
      } catch(e) {
        msg.innerHTML = '<span style="color: #ef4444;">Falha ao obter dados. O portal da SEFAZ está bloqueando a requisição no momento.</span>';
      } finally {
        btn.innerText = '↻ Atualizar Status';
        btn.disabled = false;
      }
    }

    carregarSefaz();
  </script>
</body>
</html>
