<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quality Automação — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container">
    
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">📂</div>
        <div class="brand-text">
          <span>Quality Automação</span>
          <span class="brand-sub">Arquivo FTP</span>
        </div>
      </div>

      <div class="user-profile">
        <div class="avatar">GR</div>
        <div class="user-info">
          <span class="user-name">Guilherme Rodrigues</span>
          <span class="user-role">Administrador</span>
        </div>
      </div>

      <nav class="nav-menu">
        <a href="#" class="nav-item active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          Arquivos
        </a>
      </nav>
    </aside>

    <main class="main-content">
      
      <header class="topbar">
        <div class="search-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
          <input id="search" type="text" placeholder="Buscar arquivos no servidor..." autocomplete="off" />
        </div>
        
        <div class="topbar-actions">
          <div class="badge-live"><div class="dot"></div> Server Online</div>
        </div>
      </header>

      <div class="content-wrapper">
        
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-title">Total de Arquivos</div>
            <div class="stat-value text-blue" id="stat-count">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-title">Armazenamento</div>
            <div class="stat-value" id="stat-size">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-title">Diretórios</div>
            <div class="stat-value" id="stat-folders">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-title">Atualiza em</div>
            <div class="stat-value text-green" id="stat-countdown">—</div>
          </div>
        </div>

        <div class="toolbar">
          <div class="breadcrumb" id="breadcrumb"></div>
          
          <div class="filters">
            <select id="sort-select" class="custom-select">
              <option value="name">Nome A→Z</option>
              <option value="name-desc">Nome Z→A</option>
              <option value="date-desc">Mais recente</option>
              <option value="date-asc">Mais antigo</option>
              <option value="size-desc">Maior tamanho</option>
              <option value="size-asc">Menor tamanho</option>
            </select>
            <select id="interval-select" class="custom-select">
              <option value="15">15s</option>
              <option value="30" selected>30s</option>
              <option value="60">1 min</option>
            </select>
            <button class="btn-primary" id="refresh-btn" onclick="manualRefresh()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
              Atualizar
            </button>
          </div>
        </div>

        <div class="status-bar" id="status-bar">
          <span class="loader-ring"></span> Conectando ao servidor...
        </div>

        <div class="table-container">
          <div class="table-header">
            <span>Nome do Arquivo</span>
            <span>Tamanho</span>
            <span>Última Modificação</span>
            <span>Ação</span>
          </div>
          <div id="listing" class="table-body">
            <div class="state"><span class="loader-ring"></span> Carregando dados...</div>
          </div>
        </div>

        <div class="pagination" id="pagination" style="display:none">
          <button class="btn-page" id="pg-prev" onclick="changePage(-1)">Anterior</button>
          <span class="pg-info" id="pg-info"></span>
          <button class="btn-page" id="pg-next" onclick="changePage(1)">Próxima</button>
        </div>

      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
