<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quality Automação — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header class="topbar">
      <div class="brand">📂 Quality Automação</div>
      <div class="search-bar">
        <input id="search" type="text" placeholder="Buscar arquivos..." autocomplete="off" />
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        <div class="badge-live"><div class="dot"></div> Online</div>
      </div>
    </header>
    <main class="main-content">
      <div class="content-wrapper">
        <div class="toolbar">
          <div class="breadcrumb" id="breadcrumb"></div>
        </div>
        <div id="listing" class="table-body"></div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
