<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suporte WP</title>
  <link rel="icon" type="image/png" href="./IMAGES/BrasãoAba.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    /* Estilos específicos para a Dashboard */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      margin-top: 24px;
    }
    
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .action-card {
      background: var(--bg-app);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .action-card:hover {
      border-color: #0098ff;
      background: rgba(0, 152, 255, 0.05);
      transform: translateY(-2px);
    }

    .action-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .action-title {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 15px;
    }

    /* Zendesk Links */
    .zd-link {
      display: flex;
      align-items: center;
      padding: 12px;
      color: var(--text-primary);
      text-decoration: none;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      background: rgba(136, 146, 164, 0.05);
