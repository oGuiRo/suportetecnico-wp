<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Bucket Listing Generator - Quality Automação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="navigation">
        <div class="header-container">
            <h1>S3 Bucket Listing Generator</h1>
            <p class="breadcrumbs" id="breadcrumbs">
                <a href="#">Home</a> /
            </p>
        </div>
    </header>

    <main id="listing-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Buscar nesta pasta...">
        </div>

        <table id="listing-table">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">Nome <span class="sort-icon">▲</span></th>
                    <th onclick="sortTable(1)">Última Modificação <span class="sort-icon"></span></th>
                    <th onclick="sortTable(2)">Tamanho <span class="sort-icon"></span></th>
                </tr>
            </thead>
            <tbody id="listing-body">
                <tr>
                    <td colspan="3" class="loading-status">Carregando arquivos do servidor...</td>
                </tr>
            </tbody>
        </table>
    </main>

    <script src="script.js"></script>
</body>
</html>
